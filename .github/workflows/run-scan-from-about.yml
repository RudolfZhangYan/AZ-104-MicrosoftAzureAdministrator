name: Run scan from repo About URL

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: [self-hosted, windows]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Get homepage URL from repo About
        id: repo_info
        shell: powershell
        env:
          REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"

          $apiUrl = "https://api.github.com/repos/$env:REPO"
          Write-Host "Calling GitHub API: $apiUrl"

          $headers = @{
            Accept = "application/vnd.github+json"
            "User-Agent" = "github-actions"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $repo = Invoke-RestMethod -Uri $apiUrl -Headers $headers -Method Get
          $homepage = $repo.homepage

          Write-Host "Homepage from API: [$homepage]"

          if ([string]::IsNullOrWhiteSpace($homepage)) {
            throw "Repository About/Homepage URL is empty."
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "homepage=$homepage"

      - name: Set scan meta
        id: scan_meta
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $repoName = "${{ github.event.repository.name }}"
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"

          Write-Host "Repo name: $repoName"
          Write-Host "Timestamp: $timestamp"

          Add-Content -Path $env:GITHUB_OUTPUT -Value "repo_name=$repoName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "timestamp=$timestamp"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "relative_output=$timestamp"

      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Check lab runner folder
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $runnerPath = "C:\lab-drift-runner"

          if (-not (Test-Path $runnerPath)) {
            throw "Lab runner folder not found: $runnerPath"
          }

          if (-not (Test-Path "$runnerPath\src\cli\index.ts")) {
            throw "CLI entry not found: $runnerPath\src\cli\index.ts"
          }

          Write-Host "Lab runner folder exists: $runnerPath"

      - name: Debug runner identity and session
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"

          Write-Host "=== whoami ==="
          whoami

          Write-Host "`n=== hostname ==="
          hostname

          Write-Host "`n=== USERPROFILE ==="
          Write-Host $env:USERPROFILE

          Write-Host "`n=== HOMEDRIVE/HOMEPATH ==="
          Write-Host "$env:HOMEDRIVE$env:HOMEPATH"

          Write-Host "`n=== current location ==="
          Get-Location

          Write-Host "`n=== query session ==="
          query session

          Write-Host "`n=== explorer process ==="
          tasklist | findstr /I explorer.exe

          Write-Host "`n=== runner services ==="
          Get-Service | Where-Object { $_.Name -like "actions.runner*" } | Format-Table -AutoSize

          Write-Host "`n=== runner service account ==="
          Get-WmiObject Win32_Service | Where-Object { $_.Name -like "actions.runner*" } | Select-Object Name, StartName, State | Format-Table -AutoSize

      - name: Debug auth profile files
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"

          $authRoot = Join-Path $env:USERPROFILE ".copilot-lab-runner\auth"
          Write-Host "Auth root: $authRoot"

          if (Test-Path $authRoot) {
            Get-ChildItem -Recurse $authRoot | Select-Object FullName, Length, LastWriteTime | Format-Table -AutoSize
          } else {
            Write-Host "Auth root not found"
          }

      - name: Check Edge standard install paths
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"

          $paths = @(
            "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe",
            "C:\Program Files\Microsoft\Edge\Application\msedge.exe"
          )

          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "FOUND: $p"
            } else {
              Write-Host "MISSING: $p"
            }
          }

      - name: Show Node npm and browser details
        shell: powershell
        working-directory: C:\lab-drift-runner
        run: |
          $ErrorActionPreference = "Continue"

          Write-Host "=== where node ==="
          where.exe node

          Write-Host "`n=== where npm ==="
          where.exe npm

          Write-Host "`n=== where npx ==="
          where.exe npx

          Write-Host "`n=== where msedge ==="
          where.exe msedge

          Write-Host "`n=== versions ==="
          node -v
          npm -v
          npx tsx --version

          Write-Host "`n=== playwright / mcp packages ==="
          npm ls @playwright/mcp playwright --depth=0

          Write-Host "`n=== playwright installed browsers ==="
          npx playwright install --list

      - name: Install Playwright browsers
        shell: cmd
        working-directory: C:\lab-drift-runner
        run: |
          npm install
          npx playwright install chromium

      - name: Show Playwright browsers after install
        shell: powershell
        working-directory: C:\lab-drift-runner
        run: |
          $ErrorActionPreference = "Continue"
          npx playwright install --list

      - name: Ensure output parent folder exists
        shell: powershell
        working-directory: C:\lab-drift-runner
        run: |
          $ErrorActionPreference = "Stop"

          $timestamp = "${{ steps.scan_meta.outputs.timestamp }}"
          $outDir = Join-Path (Get-Location) $timestamp

          if (-not (Test-Path $outDir)) {
            Write-Host "Creating output root: $outDir"
            New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          } else {
            Write-Host "Output root already exists: $outDir"
          }

      - name: Run scan
        shell: cmd
        working-directory: C:\lab-drift-runner
        run: |
          echo ===== SCAN INPUTS =====
          echo URL: ${{ steps.repo_info.outputs.homepage }}
          echo Output folder: ${{ steps.scan_meta.outputs.relative_output }}
          echo Browser: msedge
          echo Executable path: C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe
          echo Headless requested: true
          echo Auth profile: azure-portal
          echo =======================
          npx tsx src/cli/index.ts scan "${{ steps.repo_info.outputs.homepage }}" --browser=msedge --executable-path="C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe" --auth=azure-portal --output="./${{ steps.scan_meta.outputs.relative_output }}" --verbose

      - name: Debug output files after scan
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"

          $timestamp = "${{ steps.scan_meta.outputs.timestamp }}"
          $sourceDir = "C:\lab-drift-runner\$timestamp"

          Write-Host "Expected output dir: $sourceDir"

          if (Test-Path $sourceDir) {
            Write-Host "`n=== output tree ==="
            Get-ChildItem -Recurse $sourceDir | Select-Object FullName, Length, LastWriteTime | Format-Table -AutoSize
          } else {
            Write-Host "Output dir not found."
          }

      - name: Show recent text json md files from output
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"

          $timestamp = "${{ steps.scan_meta.outputs.timestamp }}"
          $sourceDir = "C:\lab-drift-runner\$timestamp"

          if (-not (Test-Path $sourceDir)) {
            Write-Host "Output dir not found, skipping file preview."
            exit 0
          }

          $files = Get-ChildItem -Recurse $sourceDir -Include *.txt, *.json, *.md -File | Select-Object -First 30

          foreach ($file in $files) {
            Write-Host "`n================ FILE: $($file.FullName) ================"
            try {
              Get-Content $file.FullName -TotalCount 120
            } catch {
              Write-Host "Failed to read file: $($_.Exception.Message)"
            }
          }

      - name: Copy scan output back to repo LabDrift folder
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $repoName  = "${{ steps.scan_meta.outputs.repo_name }}"
          $timestamp = "${{ steps.scan_meta.outputs.timestamp }}"

          $sourceDir = "C:\lab-drift-runner\$timestamp"
          $targetRoot = Join-Path $env:GITHUB_WORKSPACE "LabDrift"
          $targetDir  = Join-Path $targetRoot $timestamp

          if (-not (Test-Path $sourceDir)) {
            throw "Scan output folder not found: $sourceDir"
          }

          New-Item -ItemType Directory -Path $targetRoot -Force | Out-Null

          if (Test-Path $targetDir) {
            Write-Host "Removing existing timestamp folder: $targetDir"
            Remove-Item -Recurse -Force $targetDir
          }

          Write-Host "Copying from $sourceDir to $targetDir"
          Copy-Item -Path $sourceDir -Destination $targetDir -Recurse -Force

          $metaFile = Join-Path $targetDir "_meta.txt"
          "repo=$repoName`ntimestamp=$timestamp`nurl=${{ steps.repo_info.outputs.homepage }}" | Set-Content -Path $metaFile -Encoding UTF8

      - name: Commit and push LabDrift results
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add LabDrift

          $changes = git status --porcelain
          if (-not $changes) {
            Write-Host "No changes to commit."
            exit 0
          }

          git commit -m "Add lab drift results for ${{ steps.scan_meta.outputs.repo_name }} at ${{ steps.scan_meta.outputs.timestamp }}"
          git push

      - name: Remove local scan output from lab runner
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $timestamp = "${{ steps.scan_meta.outputs.timestamp }}"
          $sourceDir = "C:\lab-drift-runner\$timestamp"

          if (Test-Path $sourceDir) {
            Write-Host "Removing local output folder: $sourceDir"
            Remove-Item -Recurse -Force $sourceDir
          } else {
            Write-Host "Local output folder does not exist: $sourceDir"
          }
